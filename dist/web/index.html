<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miku Graphing Calculator</title>
    <script type="module" crossorigin src="/assets/index-DcgoBl3C.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DtGsOYJY.css">
  </head>
  <body>
    <main class="shell" aria-label="Graphing calculator">
      <section class="graph-card" aria-label="Graphing calculator workspace">
        <form class="expression-bar" id="graph-form">
          <label class="expression-label" for="expression">y =</label>
          <input
            id="expression"
            name="expression"
            autocomplete="off"
            spellcheck="false"
            value="x^2"
            aria-describedby="status"
          />
          <button class="primary-action" type="submit">Plot</button>
        </form>

        <div class="graph-stage" data-badge="01">
          <canvas id="graph" aria-label="Function graph"></canvas>
        </div>

        <p class="status" id="status" aria-live="polite"></p>
      </section>

      <aside class="control-panel" aria-label="Graph controls">
        <div class="miku-panel" aria-label="Hatsune Miku theme">
          <div class="miku-mascot" aria-hidden="true">
            <span class="miku-tail miku-tail-left"></span>
            <span class="miku-tail miku-tail-right"></span>
            <span class="miku-head"></span>
            <span class="miku-face"></span>
            <span class="miku-tie"></span>
          </div>
          <div>
            <p class="miku-kicker">01</p>
            <h1>Hatsune Miku</h1>
          </div>
        </div>

        <div class="bounds-grid">
          <label>
            x min
            <input id="x-min" type="number" step="1" value="-10" />
          </label>
          <label>
            x max
            <input id="x-max" type="number" step="1" value="10" />
          </label>
          <label>
            y min
            <input id="y-min" type="number" step="1" value="-10" />
          </label>
          <label>
            y max
            <input id="y-max" type="number" step="1" value="10" />
          </label>
        </div>

        <div class="tool-row" aria-label="Zoom controls">
          <button class="tool-button" type="button" id="zoom-in">Zoom In</button>
          <button class="tool-button" type="button" id="zoom-out">Zoom Out</button>
          <button class="tool-button" type="button" id="reset-view">Reset</button>
        </div>

        <div class="examples" aria-label="Example functions">
          <button type="button" data-example="sin(x)">sin(x)</button>
          <button type="button" data-example="x^2 - 4">x^2 - 4</button>
          <button type="button" data-example="sqrt(x)">sqrt(x)</button>
          <button type="button" data-example="1 / x">1 / x</button>
        </div>
      </aside>
    </main>
  </body>
</html>
